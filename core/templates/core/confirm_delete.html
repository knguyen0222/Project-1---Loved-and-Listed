<!DOCTYPE html>
<html>
<head>
    <title>Delete Item</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #fff5f8; }
        h1 { color: #f472b6; }
        .box { background: white; padding: 24px; border-radius: 12px; max-width: 400px; }
        button { background: #f9a8d4; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 15px; }
        button:hover { background: #f472b6; }
        a { color: #f472b6; margin-left: 16px; }
    </style>
</head>
<body>
    <h1>Delete Item</h1>
    <div class="box">
        <p>Are you sure you want to delete <strong>{{ item.item_name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Yes, delete</button>
            <a href="{% url 'closet' %}">Cancel</a>
        </form>
    </div>
</body>
</html>
