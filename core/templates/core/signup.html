<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #fff5f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .signup-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

        h1 { color: #f472b6; font-size: 24px; margin-bottom: 8px; text-align: center; }
        p { color: #aaa; font-size: 14px; text-align: center; margin-bottom: 32px; }

        label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; margin-top: 16px; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #fce7f3; border-radius: 6px; font-size: 14px; color: #444; }
        input:focus { outline: none; border-color: #f9a8d4; }

        .help-text { font-size: 11px; color: #bbb; margin-top: 4px; }
        .error { color: #e11d48; font-size: 12px; margin-top: 4px; }

        .signup-btn { width: 100%; background: #f9a8d4; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 15px; margin-top: 24px; }
        .signup-btn:hover { background: #f472b6; }

        .login-link { text-align: center; margin-top: 16px; font-size: 13px; color: #aaa; }
        .login-link a { color: #f472b6; text-decoration: none; }
    </style>
</head>
<body>
    <div class="signup-card">
        <h1>👜 Loved & Listed</h1>
        <p>Create your account</p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                    <p class="help-text">{{ field.help_text }}</p>
                {% endif %}
                {% if field.errors %}
                    {% for error in field.errors %}
                        <p class="error">{{ error }}</p>
                    {% endfor %}
                {% endif %}
            {% endfor %}
            <button type="submit" class="signup-btn">Create Account</button>
        </form>
        <div class="login-link">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>
    </div>
</body>
</html>
